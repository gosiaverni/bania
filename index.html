<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Interaktywna mapa</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- MAPA -->
  <div id="map"></div>

  <!-- LEWY GÓRNY PANEL -->
  <div class="top-left">

    <div class="menu-group castles">
      <button class="main-btn dark">Romanizm</button>
      <div class="submenu">
 
  <button data-place="polska_romanizm">Polska</button>
  <button data-place="niemcy_romanizm">Niemcy</button>
  <button data-place="francja_romanizm">Francja</button>
  <button data-place="anglia_romanizm">Anglia</button>
  <button data-place="wlochy_romanizm">Włochy</button>
 
      </div>
    </div>

    <div class="menu-group cities">
      <button class="main-btn gold">Gotyk</button>
     <div class="submenu">
      
  <button data-place="polska_gotyk">Polska</button>
  <button data-place="niemcy_gotyk">Niemcy</button>
  <button data-place="francja_gotyk">Francja</button>
  <button data-place="anglia_gotyk">Anglia</button>
  <button data-place="wlochy_gotyk">Włochy</button>
  <button data-place="hiszpania_gotyk">Hiszpania</button>
</div>
    </div>
        </div>

 

  

  

<!-- PRAWY PANEL -->
<div class="info-panel" id="infoPanel">
  <h2 id="placeTitle">Tytuł</h2>
  <p id="placeDescription">tutaj opis</p>
</div>

<!-- LEWE PANELE -->
<div class="left-panels">

  <div class="gallery-panel" id="photoPanel">
    <img id="photoImage" src="" alt="">
    <div class="gallery-controls">
      <button id="prevPhoto">←</button>
      <button id="nextPhoto">→</button>
    </div>
  </div>

  <div class="gallery-panel" id="planPanel">
    <img id="planImage" src="" alt="">
    <div class="gallery-controls">
      <button id="prevPlan">←</button>
      <button id="nextPlan">→</button>
    </div>
  </div>

</div>
<div class="lightbox" id="lightbox">
  <img id="lightboxImage" src="">
</div>
</div>

<script src="script.js" defer></script>
</body>
</html>
